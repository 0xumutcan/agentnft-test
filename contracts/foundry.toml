[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
abstract_testnet = "${ABSTRACT_RPC}"
base_sepolia = "${BASE_RPC}"

[etherscan]
abstract_testnet = { key = "verifyonly", url = "https://sepolia.abscan.org/api" }
